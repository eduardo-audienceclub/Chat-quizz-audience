  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      /* ===== TEMA CLEAN (claro) — roxo Core só como acento ===== */
      --bg-page: #fafafc;
      --bg-header: #0d0a1a;
      --bg-card: #ffffff;
      --bg-soft: #f2f1f7;          /* bolha do bot */
      --bg-input: #ffffff;
      --text: #18141f;
      --text-dim: #4a4458;
      --text-muted: #9b95a8;
      --border: rgba(24, 20, 31, 0.08);
      --border-accent: rgba(161, 85, 242, 0.3);
      --accent: #a155f2;
      --accent-bright: #b876ff;
      --accent-dark: #7d3bd6;
      --accent-soft: rgba(161, 85, 242, 0.09);
      --accent-glow: rgba(161, 85, 242, 0.3);
      --green: #25d366;
      --green-dark: #1faa52;
      --gold: #f5a623;
      --red: #e5485f;
      --gradient: linear-gradient(135deg, #a155f2 0%, #8b3fe0 100%);
      --gradient-gold: linear-gradient(135deg, #f7b545 0%, #ef8f1f 100%);
      --shadow-soft: 0 1px 2px rgba(24,20,31,.04), 0 8px 24px rgba(24,20,31,.06);
      --radius: 18px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-page);
      color: var(--text);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ===== HEADER (claro, identidade própria: badge de marca + pill de etapa + linha de progresso) ===== */
    header {
      background: #fff;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 10;
      animation: headerIn .6s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes headerIn { from { transform: translateY(-100%); } to { transform: translateY(0); } }
    .topbar {
      max-width: 720px; margin: 0 auto; padding: 12px 18px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .brand { display: flex; align-items: center; gap: 11px; min-width: 0; }
    .brand-badge {
      background: var(--bg-header); border-radius: 11px; padding: 8px 12px;
      display: flex; align-items: center; flex-shrink: 0;
    }
    .brand-badge img { height: 17px; width: auto; max-width: 92px; object-fit: contain; display: block; }
    .brand-sub {
      font-size: 12.5px; font-weight: 600; color: var(--text-dim);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .step-pill {
      background: var(--accent-soft); color: var(--accent-dark);
      font-size: 12px; font-weight: 700; padding: 6px 13px; border-radius: 99px;
      flex-shrink: 0; letter-spacing: .02em;
    }
    .step-pill.bump { animation: pillBump .4s ease; }
    @keyframes pillBump { 50% { transform: scale(1.18); } }
    .progress-line { height: 3px; background: var(--accent-soft); }
    .progress-line i {
      display: block; height: 100%; width: 0%;
      background: var(--gradient); border-radius: 0 3px 3px 0;
      transition: width .6s cubic-bezier(.22,1,.36,1);
    }

    /* ===== CHAT ===== */
    main { flex: 1; overflow-y: auto; scroll-behavior: smooth; }
    .chat { max-width: 720px; margin: 0 auto; padding: 28px 18px 24px; display: flex; flex-direction: column; gap: 14px; }

    .row { display: flex; gap: 10px; align-items: flex-end; animation: msgIn .45s cubic-bezier(.22,1,.36,1) both; }
    @keyframes msgIn { from { opacity: 0; transform: translateY(16px) scale(.97); } to { opacity: 1; transform: none; } }
    .row.user { justify-content: flex-end; }

    .avatar {
      width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
      background: var(--bg-header); border: 1.5px solid var(--border-accent);
      overflow: hidden; display: flex; align-items: center; justify-content: center;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .avatar img.is-logo { object-fit: contain; padding: 4px; }
    .row.cont .avatar { visibility: hidden; }

    .bubble {
      max-width: 82%;
      padding: 13px 17px;
      border-radius: var(--radius);
      font-size: 15px;
      line-height: 1.55;
      color: var(--text-dim);
      word-break: break-word;
    }
    .bubble b, .bubble strong { color: var(--text); font-weight: 700; }
    .row.bot .bubble { background: var(--bg-soft); border-bottom-left-radius: 6px; }
    .row.user .bubble {
      background: var(--gradient); color: #fff; font-weight: 600;
      border-bottom-right-radius: 6px; box-shadow: 0 4px 18px rgba(161,85,242,.28);
    }
    .row.user .bubble b { color: #fff; }

    /* typing indicator */
    .typing { display: inline-flex; gap: 5px; padding: 17px; align-items: center; }
    .typing i { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); opacity: .3; animation: dotPulse 1.1s infinite; }
    .typing i:nth-child(2) { animation-delay: .18s; }
    .typing i:nth-child(3) { animation-delay: .36s; }
    @keyframes dotPulse { 30% { opacity: 1; transform: translateY(-4px) } }

    /* ===== LOADER DE RETENÇÃO (cargas longas) ===== */
    .loader-card { min-width: min(300px, 70vw); background: var(--bg-card) !important; border: 1px solid var(--border); box-shadow: var(--shadow-soft); }
    .loader-title { font-weight: 700; color: var(--text); font-size: 14px; }
    .loader-steps { margin-top: 12px; display: flex; flex-direction: column; gap: 9px; }
    .lstep { display: flex; gap: 10px; align-items: center; font-size: 13.5px; color: var(--text-muted); transition: color .3s; }
    .lstep .ic {
      width: 18px; height: 18px; flex-shrink: 0; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 800;
    }
    .lstep.doing { color: var(--text); font-weight: 600; }
    .lstep.doing .ic::after {
      content: ''; width: 11px; height: 11px; border-radius: 50%;
      border: 2px solid var(--accent-soft); border-top-color: var(--accent);
      animation: spin .7s linear infinite;
    }
    .lstep.ok { color: var(--text-dim); }
    .lstep.ok .ic { background: #e7f8ee; color: var(--green-dark); animation: popIn .3s ease; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes popIn { from { transform: scale(.4); } 70% { transform: scale(1.2); } to { transform: scale(1); } }
    .loader-bar { margin-top: 14px; height: 5px; border-radius: 3px; background: var(--accent-soft); overflow: hidden; }
    .loader-bar i {
      display: block; height: 100%; width: 5%;
      background: var(--gradient); border-radius: 3px;
      transition: width .9s cubic-bezier(.22,1,.36,1);
      position: relative;
    }
    .loader-bar i::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.55), transparent);
      animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer { from { transform: translateX(-100%); } to { transform: translateX(100%); } }

    /* ===== CARD DE PERFIL (Apify) ===== */
    .pcard-bubble { max-width: 88% !important; background: var(--bg-card) !important; border: 1px solid var(--border); box-shadow: var(--shadow-soft); }
    .pcard { display: flex; gap: 14px; align-items: center; }
    .ppic {
      width: 64px; height: 64px; border-radius: 50%; flex-shrink: 0;
      background: var(--bg-soft) center/cover no-repeat;
      border: 2.5px solid transparent;
      background-clip: padding-box;
      box-shadow: 0 0 0 2.5px var(--accent);
    }
    .pname { font-weight: 700; color: var(--text); font-size: 15px; display: flex; align-items: center; gap: 6px; }
    .pverif {
      display: inline-flex; align-items: center; justify-content: center;
      width: 15px; height: 15px; border-radius: 50%;
      background: #4da6ff; color: #fff; font-size: 9px; font-weight: 800;
    }
    .puser { color: var(--accent-dark); font-size: 13px; font-weight: 600; margin-top: 1px; }
    .pstats { display: flex; gap: 14px; margin-top: 7px; font-size: 12.5px; color: var(--text-muted); }
    .pstats b { color: var(--text); font-size: 14px; }
    .pcat {
      display: inline-block; margin-top: 7px; padding: 3px 10px; border-radius: 99px;
      background: var(--accent-soft);
      font-size: 11px; color: var(--accent-dark); font-weight: 700;
    }

    /* ===== RESULT CARD + CTA ===== */
    .result-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-soft);
      border-radius: var(--radius);
      padding: 20px;
      max-width: 88%;
    }
    .result-card h3 { font-size: 16px; margin-bottom: 8px; color: var(--text); }
    .result-card p { font-size: 14.5px; line-height: 1.6; color: var(--text-dim); }
    .score-pill {
      display: inline-flex; align-items: center; gap: 7px;
      background: var(--accent-soft);
      padding: 5px 13px; border-radius: 99px; font-size: 12.5px; font-weight: 700;
      color: var(--accent-dark); margin-bottom: 12px; letter-spacing: .04em;
    }
    .cta-btn {
      display: flex; align-items: center; justify-content: center; gap: 9px;
      width: 100%; padding: 15px; margin-top: 12px;
      border: none; border-radius: 13px; cursor: pointer;
      font-family: inherit; font-size: 15px; font-weight: 700; color: #fff;
      text-decoration: none; transition: transform .15s, box-shadow .15s;
    }
    .cta-btn:active { transform: scale(.97); }
    .cta-btn.whats { background: linear-gradient(135deg, #25d366, #1faa52); box-shadow: 0 6px 20px rgba(37,211,102,.3); }
    .cta-btn.gift { background: var(--gradient-gold); color: #3c2503; box-shadow: 0 6px 22px rgba(245,166,35,.35); animation: giftPulse 2s ease-in-out infinite; }
    @keyframes giftPulse { 50% { box-shadow: 0 6px 32px rgba(245,166,35,.55); transform: translateY(-1px); } }
    .cta-btn svg { width: 20px; height: 20px; flex-shrink: 0; }

    /* ===== INPUT DOCK (inline: aparece logo abaixo da pergunta) ===== */
    .dock { width: 100%; padding: 2px 0 6px; }
    .dock-inner { max-width: 100%; }
    .field-label {
      font-size: 10.5px; letter-spacing: .22em; font-weight: 700;
      color: var(--text-muted); text-transform: uppercase;
      margin: 0 0 8px 6px; display: none;
    }
    .input-wrap {
      display: none;
      align-items: center; gap: 8px;
      background: var(--bg-input);
      border: 1.5px solid var(--border);
      box-shadow: var(--shadow-soft);
      border-radius: 99px;
      padding: 7px 7px 7px 20px;
      transition: border-color .25s, box-shadow .25s;
      animation: msgIn .4s both;
    }
    .input-wrap.show { display: flex; }
    .field-label.show { display: block; }
    .input-wrap:focus-within { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-soft); }
    .input-wrap .prefix { color: var(--text-muted); font-weight: 600; font-size: 15px; display: none; }
    .input-wrap .prefix.show { display: block; }
    .input-wrap .prefix .ddi-sel { border: none; background: transparent; font: inherit; font-weight: 600; color: var(--text); cursor: pointer; outline: none; padding: 0 2px 0 0; max-width: 96px; }
    .input-wrap input {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text); font-family: inherit; font-size: 16px; min-width: 0;
    }
    .input-wrap input::placeholder { color: var(--text-muted); }
    .send-btn {
      width: 46px; height: 46px; border-radius: 50%; border: none; cursor: pointer;
      background: var(--gradient); color: #fff; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      opacity: .3; pointer-events: none; transition: opacity .25s, transform .15s;
    }
    .send-btn.ready { opacity: 1; pointer-events: auto; box-shadow: 0 4px 14px var(--accent-glow); }
    .send-btn:active { transform: scale(.92); }
    .input-hint { font-size: 12px; color: var(--red); margin: 7px 6px 0; min-height: 15px; }
    .lgpd { font-size: 11px; color: var(--text-muted); text-align: center; margin-top: 10px; line-height: 1.5; }

    /* select (perguntas com muitas opções) */
    .select-wrap { display: none; align-items: center; gap: 8px; animation: msgIn .4s both; }
    .select-wrap.show { display: flex; }
    .select-shell { position: relative; flex: 1; min-width: 0; }
    .select-shell select {
      width: 100%; appearance: none; -webkit-appearance: none;
      background: var(--bg-card); border: 1.5px solid var(--border);
      box-shadow: var(--shadow-soft); border-radius: 99px;
      padding: 14px 44px 14px 20px; font-family: inherit; font-size: 15px;
      color: var(--text); outline: none; cursor: pointer; transition: border-color .25s, box-shadow .25s;
    }
    .select-shell select:focus { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-soft); }
    .select-shell select:invalid { color: var(--text-muted); }
    .select-shell::after {
      content: '▾'; position: absolute; right: 19px; top: 50%; transform: translateY(-50%);
      color: var(--text-muted); pointer-events: none; font-size: 13px;
    }

    /* destaque do gatilho principal ausente */
    .gatilho-falta {
      margin-top: 12px; display: flex; align-items: center; gap: 10px;
      background: linear-gradient(135deg, #fff3f0, #ffe8e2);
      border: 1.5px solid #f3b8a6; border-radius: 12px; padding: 11px 14px;
      font-size: 13px; color: #7a3522; font-weight: 600;
    }
    .gatilho-falta .gf-ic { font-size: 18px; }
    .gatilho-falta b { color: #5c2412; }

    /* pilares trancados do diagnóstico (curiosidade → sessão) */
    .locked {
      margin-top: 14px; border: 1.5px dashed rgba(161, 85, 242, .35);
      border-radius: 13px; padding: 12px 13px; background: rgba(161, 85, 242, .04);
    }
    .locked-row {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 13.5px; color: var(--text); padding: 3px 0;
    }
    .locked-nota {
      background: var(--accent-soft); color: var(--accent-dark);
      font-weight: 800; font-size: 12px; padding: 3px 10px; border-radius: 99px;
    }
    .locked-fake {
      filter: blur(4px); user-select: none; pointer-events: none;
      font-size: 12px; color: var(--text-muted); line-height: 1.5;
      margin: 4px 0 9px;
    }
    .locked-cta {
      margin-top: 8px; padding-top: 10px; border-top: 1px dashed rgba(161, 85, 242, .25);
      font-size: 12.5px; color: var(--text-dim); text-align: center;
    }

    /* introdução do Método CORE — contexto dos 3 pilares antes do diagnóstico */
    .metodo-intro {
      border: 1.5px solid rgba(161, 85, 242, .22); border-radius: 14px;
      padding: 13px 14px; background: linear-gradient(180deg, rgba(161, 85, 242, .06), rgba(161, 85, 242, .015));
    }
    .metodo-intro .mi-head { font-size: 13.5px; color: var(--text); line-height: 1.5; margin-bottom: 10px; }
    .mi-pilar { display: flex; gap: 10px; align-items: flex-start; padding: 6px 0; }
    .mi-pilar .mi-ic { font-size: 17px; line-height: 1.45; flex: 0 0 auto; }
    .mi-pilar b { display: block; font-size: 13.5px; color: var(--text); }
    .mi-pilar i { font-style: normal; font-size: 12.5px; color: var(--text-muted); line-height: 1.4; }
    .mi-foot {
      margin-top: 10px; padding-top: 10px; border-top: 1px dashed rgba(161, 85, 242, .22);
      font-size: 12.5px; color: var(--text-dim); line-height: 1.5;
    }
    .mi-foot b { color: var(--accent-dark); }

    /* anúncio do presente (ênfase) */
    .bubble.gift-announce {
      background: linear-gradient(135deg, #fff7e4, #ffedc4);
      border: 1.5px solid #f0cd86;
      color: #6b4a0c; font-weight: 600;
      box-shadow: 0 6px 22px rgba(240, 180, 60, .22);
      animation: giftAnnounce .6s cubic-bezier(.22,1,.36,1) both;
    }
    .bubble.gift-announce b { color: #4a3105; }
    .bubble.gift-announce .gift-prod { font-size: 17.5px; letter-spacing: .01em; }
    @keyframes giftAnnounce { from { opacity: 0; transform: translateY(18px) scale(.94); } 70% { transform: scale(1.02); } to { opacity: 1; transform: none; } }

    /* chips */
    .chips { display: none; flex-wrap: wrap; gap: 9px; justify-content: center; animation: msgIn .4s both; }
    .chips.show { display: flex; }
    .chip {
      background: var(--bg-card); border: 1.5px solid var(--border);
      box-shadow: var(--shadow-soft);
      color: var(--text-dim); border-radius: 99px;
      padding: 11px 18px; font-family: inherit; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all .18s;
    }
    .chip:hover, .chip:focus-visible { border-color: var(--accent); color: var(--accent-dark); background: var(--accent-soft); }
    .chip:active { transform: scale(.95); }

    /* seletor de reels */
    .reels {
      display: none; gap: 10px; overflow-x: auto; padding: 4px 2px 10px;
      animation: msgIn .4s both; scrollbar-width: thin; scrollbar-color: var(--accent) transparent;
    }
    .reels.show { display: flex; }
    .reel-card {
      flex: 0 0 118px; height: 180px; border-radius: 14px; border: 2px solid var(--border);
      background: #e9e7f1 center/cover no-repeat; cursor: pointer; position: relative;
      transition: transform .18s, border-color .18s, box-shadow .18s; overflow: hidden; padding: 0;
      box-shadow: var(--shadow-soft);
    }
    .reel-card::after { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, transparent 55%, rgba(0,0,0,.7)); }
    .reel-card:hover { transform: translateY(-4px); border-color: var(--accent); box-shadow: 0 10px 26px var(--accent-glow); }
    .reel-views {
      position: absolute; bottom: 8px; left: 8px; z-index: 1;
      background: rgba(0,0,0,.55); backdrop-filter: blur(4px);
      color: #fff; font-size: 11.5px; font-weight: 700; font-family: inherit;
      padding: 4px 9px; border-radius: 99px;
    }

    /* ===== AGENDA INLINE (no chat, estilo Viver de IA) ===== */
    .agenda-card {
      padding: 0 !important; overflow: hidden; width: min(380px, 88vw);
      background: var(--bg-card) !important; border: 1px solid var(--border);
      box-shadow: var(--shadow-soft); border-radius: var(--radius);
    }
    .ag-head {
      background: var(--bg-header); color: #fff;
      padding: 15px 18px; display: flex; gap: 12px; align-items: center;
    }
    .ag-head .ag-ic { font-size: 20px; }
    .ag-head h4 { font-size: 15.5px; font-weight: 700; }
    .ag-head p { font-size: 12px; color: rgba(255,255,255,.65); margin-top: 1px; }
    .ag-body { padding: 14px 14px 16px; }
    .ag-today {
      display: flex; justify-content: center; margin-bottom: 12px;
    }
    .ag-today span {
      display: inline-flex; align-items: center; gap: 6px;
      border: 1px solid var(--border); border-radius: 99px;
      padding: 7px 14px; font-size: 12.5px; color: var(--text-dim); font-weight: 500;
      box-shadow: var(--shadow-soft);
    }
    .ag-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .ag-nav b { font-size: 15px; color: var(--text); }
    .ag-nav button {
      width: 34px; height: 34px; border-radius: 50%; border: none; cursor: pointer;
      background: var(--bg-soft); color: var(--text); font-size: 15px;
      display: flex; align-items: center; justify-content: center; transition: all .15s;
    }
    .ag-nav button:disabled { opacity: .3; cursor: default; }
    .ag-nav button:not(:disabled):hover { background: var(--accent-soft); color: var(--accent-dark); }
    .ag-grid {
      border: 1px solid var(--border); border-radius: 14px; padding: 10px 8px;
      box-shadow: var(--shadow-soft);
    }
    .ag-week, .ag-days { display: grid; grid-template-columns: repeat(7, 1fr); }
    .ag-week span {
      text-align: center; font-size: 11px; font-weight: 700;
      color: var(--text-muted); padding: 4px 0 8px;
    }
    .ag-d {
      aspect-ratio: 1; border: none; background: none; border-radius: 50%;
      font-family: inherit; font-size: 13.5px; display: flex; align-items: center;
      justify-content: center; color: #c9c5d4; cursor: default; margin: 1px auto;
      width: 36px; max-width: 100%;
    }
    .ag-d.on { color: var(--text); font-weight: 700; cursor: pointer; transition: all .15s; }
    .ag-d.on:hover { background: var(--accent-soft); }
    .ag-d.sel { background: var(--bg-header); color: #fff; font-weight: 700; }

function tplPreDiag() {
  const d = state.data;
  const p = d.profile || {};
  const r = d.reel;
  const s = safeData();
  const f = p.followersCount || 0;
  const cap = (r && r.caption) || '';

  // notas heurísticas (critérios do método aplicados aos números)
  const ratio = r && r.views != null && f > 0 ? r.views / f : null;
  const engPct = r && f > 0 ? (((r.likes || 0) + (r.comments || 0)) / f) * 100 : null;
  const n1 = ratio == null ? 5 : ratio >= 2 ? 8 : ratio >= 1 ? 7 : ratio >= 0.5 ? 5 : ratio >= 0.2 ? 4 : 3;

  const temCtaGenerico = /link|bio|salv|compartilh|segue|me siga|arrast/i.test(cap);
  const n3 = temIsca ? 7 : temCtaGenerico ? 5 : 2;
  const geral = ((n1 + n2 + n3) / 3).toFixed(1).replace('.', ',');

  const t1 = `<b>${s.primeiro}</b>, olhando o <b>@${s.instagram}</b>: ${fmtNum(f)} seguidores e ${fmtNum(p.postsCount || 0)} publicações.` +

  const v1 = ratio == null
    ? 'Sem métricas do reel pra avaliar o gancho — o que já indica espaço pra estruturar a abertura pelos gatilhos do método.'
    : ratio >= 1
      ? `${fmtNum(r.views)} views (${ratio.toFixed(1).replace('.', ',')}x a base): o gancho está furando a bolha — agora é refinar pra escalar.`
      : `${fmtNum(r.views)} views pra ${fmtNum(f)} de base (${ratio.toFixed(2).replace('.', ',')}x): a abertura não ativa nenhum gatilho — o algoritmo não distribui além de quem já te segue.`;

  const fim = `O problema não é o seu conteúdo, <b>${s.primeiro}</b> — é a estrutura do gancho. ${SEEDS_METODO[1]}`;

  // heurística do gatilho ausente: alcance preso → Atenção Imediata; alcance ok mas eng. frio → Recompensa
  const gatilho = (ratio != null && ratio < 1) ? 'Atenção Imediata' : 'Recompensa';

  return {
    html: t1 +
      `<br><br><b>Score CORE do reel: ${geral}/10</b>` +
      `<br><br>⚡ <b>Gatilho da Atenção — ${n1}/10</b><br>${v1}` +

let state = { step: 0, data: {}, leadRef: null, done: false };
try {
  const saved = JSON.parse(localStorage.getItem(SKEY) || 'null');
  if (saved && saved.leadRef && !saved.done) state = saved;
} catch (e) {}
if (!state.leadRef) state.leadRef = 'lr_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 9);
function persist() { try { localStorage.setItem(SKEY, JSON.stringify(state)); } catch (e) {} }

/* captura UTMs/click-id da URL de entrada — 1x, e persiste no state (sobrevive
   às etapas/refresh e vai junto em todo salvarLead). Preserva a 1ª atribuição. */
(function capturarUTMs() {
  try {
    const p = new URLSearchParams(location.search);
    const get = (k) => (p.get(k) || '').slice(0, 200);
    const u = {
      source: get('utm_source'), medium: get('utm_medium'), campaign: get('utm_campaign'),
      content: get('utm_content'), term: get('utm_term'), fbclid: get('fbclid') || get('gclid'),
    };
    state.data.utm = state.data.utm || {};
    let mudou = false;
    for (const k of Object.keys(u)) if (u[k] && !state.data.utm[k]) { state.data.utm[k] = u[k]; mudou = true; }
    if (!state.data.referrer && document.referrer) { state.data.referrer = document.referrer.slice(0, 300); mudou = true; }
    if (mudou) persist();
  } catch (e) {}
})();

/* ================================================================
   LOADER DE RETENÇÃO — card com etapas + barra (cargas longas).
   Os passos avançam por timer e o último segura até o done().
   titulo/steps: strings estáticas deste arquivo (handle já escapado).
   ================================================================ */
function showLoader(titulo, steps, intervalMs = 5000) {
  const row = document.createElement('div');
  row.className = `row bot${lastSide === 'bot' ? ' cont' : ''}`;
  const stepsHtml = steps.map((t, i) =>
    `<div class="lstep${i === 0 ? ' doing' : ''}"><span class="ic"></span><span>${t}</span></div>`
  ).join('');
  row.innerHTML =
    avatarHtml() +
    `<div class="bubble loader-card"><div class="loader-title">${titulo}</div>` +
    `<div class="loader-steps">${stepsHtml}</div>` +
    `<div class="loader-bar"><i></i></div></div>`;
  chat.appendChild(row);
  lastSide = 'bot';
  scrollDown();

  const bar = row.querySelector('.loader-bar i');
  const els = [...row.querySelectorAll('.lstep')];
  let cur = 0;
  const setBar = () => { bar.style.width = Math.min(10 + ((cur + 0.5) / steps.length) * 80, 92) + '%'; };
  requestAnimationFrame(setBar);

  const timer = setInterval(() => {
    if (cur >= steps.length - 1) return; // segura no último passo até resolver
    els[cur].classList.remove('doing'); els[cur].classList.add('ok');
    els[cur].querySelector('.ic').textContent = '✓';
    cur++;
    els[cur].classList.add('doing');
    setBar(); scrollDown();
  }, intervalMs);

  return {
    async done() {
      clearInterval(timer);
      els.forEach(e => {
        e.classList.remove('doing'); e.classList.add('ok');
        e.querySelector('.ic').textContent = '✓';
      });
      bar.style.width = '100%';
      await sleep(550);
      row.style.transition = 'opacity .35s, transform .35s';
      row.style.opacity = '0'; row.style.transform = 'translateY(-8px)';
      await sleep(360);
      row.remove();
      lastSide = null;
    },
  };
}

function hideDock() {

function askText({ label, placeholder, prefix = '', type = 'text', mask = null, validate, onOk, ddiSelect = false }) {
  hideDock(); ensureDockLast();
  labelEl.textContent = label; labelEl.classList.add('show');
  wrapEl.classList.add('show');
  if (ddiSelect) {
    // seletor de país (DDI) no lugar do prefixo fixo; Brasil é o padrão

    sel.innerHTML = PAISES.map((p) => `<option value="${p.ddi}">${p.f} +${p.ddi}</option>`).join('');
    sel.value = '55';
    prefixEl.classList.add('show');
    sel.onchange = () => {
      foneDDI = sel.value;
      input.value = mask ? mask(input.value) : input.value;
      input.placeholder = foneDDI === '55' ? '(11) 99999-9999' : 'só os números';
      hintEl.textContent = '';
      sendBtn.classList.toggle('ready', validate(input.value).ok);
      input.focus({ preventScroll: true });
    };
  } else {
    prefixEl.textContent = prefix; prefixEl.classList.toggle('show', !!prefix);
  }
  input.value = ''; input.placeholder = placeholder;
  input.type = type; input.inputMode = type === 'tel' ? 'tel' : (type === 'email' ? 'email' : 'text');
  sendBtn.classList.remove('ready');
  input.oninput = () => {
    if (mask) input.value = mask(input.value);
    hintEl.textContent = '';
    sendBtn.classList.toggle('ready', validate(input.value).ok);
  };
  onSubmit = async () => {
    const v = validate(input.value);
    if (!v.ok) { hintEl.textContent = v.erro || ''; return; }
    hideDock(); onSubmit = null;
    await onOk(v.valor);
  };
  setTimeout(() => input.focus({ preventScroll: true }), 350);
}

};

/* Conversão Meta (Pixel + CAPI) — dispara p/ lead QUALIFICADO 10k+ em ambas
   as trilhas: premium (médico) e audience (10k+ não-médico). 1x por lead.
   Evento de Lead puro (SEM valor). Mesmo eventID no Pixel e na CAPI → o Meta
   deduplica. Hash dos dados e token da CAPI ficam no backend (/api/fb-event). */
// Eventos Meta (Pixel browser + CAPI server, deduplicados por eventID) — só leads 10k+.
//  • Lead     → dispara na CLASSIFICAÇÃO (virou closer/audience, logo após reel+renda).
//               Meta otimiza pelo LEAD QUALIFICADO e captura até quem não agenda.
//  • Schedule → dispara no AGENDAMENTO (booking confirmado). Mede quem fechou horário.
// Cada um tem sua própria flag de 1x-por-lead (persistida), então não se atrapalham.
function dispararEventoMeta(eventName, flagKey, contentName) {
  const d = state.data;
  if (d.callTrack !== 'premium' && d.callTrack !== 'audience') return;  // só 10k+
  if (d[flagKey]) return;                       // evita duplicar (1x por lead)
  d[flagKey] = true; persist();

  const eventId = `${eventName.toLowerCase()}_${state.leadRef || 'x'}_${Date.now()}`;
  const custom = { content_name: contentName, currency: 'BRL' };  // evento de lead/schedule — sem value

  // 1) Pixel (navegador)
  try { if (window.fbq) fbq('track', eventName, custom, { eventID: eventId }); } catch (e) {}

  // 2) CAPI (servidor) — mesmo eventID; manda dados p/ matching (hash é no backend)
  const cookie = (n) => (document.cookie.match('(^|;)\\s*' + n + '=([^;]+)') || [])[2] || '';
  postJSON(CONFIG.API_FB_EVENT, {
    event_name: eventName, event_id: eventId, track: d.callTrack,
    content_name: contentName,
    email: d.email || '', phone: d.whatsapp || '', nome: d.nome || '',
    fbp: cookie('_fbp'), fbc: cookie('_fbc'),
    event_source_url: location.href, currency: 'BRL',
  }, 6000);
}
function contentNameTrilha() {
  return state.data.callTrack === 'premium' ? 'Sessão Estratégica (closers)' : 'Call de Raio X';
}
// Lead na classificação (lead qualificado 10k+ — mesmo que não agende depois).
function dispararLeadQualificado() { dispararEventoMeta('Lead', 'leadPixelEnviado', contentNameTrilha()); }
// Schedule no agendamento (booking confirmado).
function dispararAgendamento() { dispararEventoMeta('Schedule', 'schedulePixelEnviado', contentNameTrilha()); }

/* ================================================================
   APIFY — perfil + reels (assíncrono: start + polling)
   ================================================================ */
async function postJSON(url, payload, timeoutMs = 9000) {
  try {
    const ctl = new AbortController();
    const timer = setTimeout(() => ctl.abort(), timeoutMs);
    const r = await fetch(url, {
      method: 'POST', signal: ctl.signal,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    clearTimeout(timer);
    if (r.ok) return await r.json();
  } catch (e) { /* rede falhou */ }
  return null;
}

async function fetchPerfil(handle) {
  const start = await postJSON(CONFIG.API_PROFILE, { action: 'start', username: handle });
  if (!start || start.status !== 'started') return start; // no_key / erro → fluxo manual
  const t0 = Date.now();
  while (Date.now() - t0 < 55000) {
    await sleep(2500);
    const res = await postJSON(CONFIG.API_PROFILE, { action: 'poll', runId: start.runId, datasetId: start.datasetId });
    if (res && res.status && res.status !== 'running') return res;
  }
  return null; // estourou a paciência → fluxo manual
}

async function gerarPreDiagnostico() {
  const d = state.data;
  try {
    const ctl = new AbortController();
    const timer = setTimeout(() => ctl.abort(), 15000);
    const r = await fetch(CONFIG.API_DIAGNOSIS, {
      method: 'POST', signal: ctl.signal,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        nome: d.nome, instagram: d.instagram, nicho: d.nicho, uf: d.uf,
        desafio: d.desafio || '', faturamento: d.faturamento || '',
        profile: d.profile || null, reel: d.reel || null,
        transcript: d.reelTranscript || '',
      }),
    });
    clearTimeout(timer);
    if (r.ok) {
      const j = await r.json();
      if (j.ok && j.text) {
        // escapa TUDO que veio de fora, depois aplica só a formatação nossa
        return {
          html: esc(j.text).replace(/\*\*(.+?)\*\*/g, '<b>$1</b>').replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>'),
          notas: j.notas || null,
          gatilho: j.gatilho || '',
        };
      }
    }
  } catch (e) { /* segue pro fallback */ }
  return tplPreDiag();
}

  const nota = (n) => n != null ? `${n}/10` : '🔒';
  const fake = 'A análise completa deste pilar fica disponível na sua sessão com o time — incluindo os ajustes recomendados pro seu perfil e os exemplos aplicados ao seu nicho.';
  return `
    <div class="locked">
      <div class="locked-row"><span>🔥 <b>Conteúdo Notável</b></span><span class="locked-nota">${nota(notas && notas.notavel)}</span></div>
      <div class="locked-fake">${fake}</div>
      <div class="locked-row"><span>🎯 <b>CTA & Conversão</b></span><span class="locked-nota">${nota(notas && notas.cta)}</span></div>
      <div class="locked-fake">${fake}</div>
      <div class="locked-cta">🔒 As análises completas desses 2 pilares — e as correções — eu abro na sua <b>Sessão Estratégica</b></div>
    </div>`;
}

/* ================================================================
   FLUXO PRINCIPAL — 8 etapas
   0 nome · 1 whats · 2 email · 3 @ · 4 reel(ou seguidores) ·
   5 nicho(+pré-diag) · 6 desafio · 7 faturamento · 8 final
   ================================================================ */
async function etapaNome(replay = false) {
  if (!replay) {
    await bot('Perfis que aplicam o conteúdo certo estão multiplicando o alcance em até <b>10x</b> e transformando seguidores em <b>vendas</b> — sem investir 1 real em anúncio. Quer descobrir o que está travando o crescimento do seu perfil?', { delay: 1100 });
    await bot('Bora começar: qual seu nome?');
  }
  askText({
    label: 'Nome completo', placeholder: 'Digite seu nome e sobrenome...',
    validate: vNome,
    onOk: async (nome) => {
      user(nome);
      state.data.nome = nome; state.step = 1; persist(); setProgress(1);
      await etapaWhats();
    },
  });
}

async function etapaWhats(replay = false) {
  const primeiro = esc(state.data.nome.split(' ')[0]);
  if (!replay) await bot(`Prazer, <b>${primeiro}</b>! 👊 Pra eu te enviar o resultado completo do diagnóstico, qual seu WhatsApp?`);
  askText({
    label: 'WhatsApp', placeholder: '(11) 99999-9999', type: 'tel', mask: maskFoneIntl,
    validate: vFoneIntl, ddiSelect: true,
    onOk: async (fone) => {
      const ddi = foneDDI, isBR = ddi === '55';
      user(isBR ? '🇧🇷 ' + maskFone(fone) : '+' + ddi + ' ' + fone);
      const uf = isBR ? DDD_UF[+fone.slice(0, 2)] : '';
      state.data.whatsapp = ddi + fone;   // E.164 sem '+' (ddi + número), funciona p/ Cal/CAPI/WhatsApp
      state.data.uf = uf || '';
      state.data.paisDDI = ddi;
      state.step = 2; persist(); setProgress(2);
      salvarLead('parcial');
      await bot(isBR ? (MSG_UF[uf] || MSG_UF_FALLBACK) : 'Show, recebido! 🌎', { delay: 1000 });
      await etapaEmail();
    },
  });
}

async function etapaEmail(replay = false) {
  if (!replay) await bot('E qual seu melhor e-mail?', { delay: 700 });
  askText({
    label: 'E-mail', placeholder: 'seu@email.com', type: 'email',
    validate: vEmail,
    onOk: async (email) => {
      user(email);
      const sugestao = sugerirEmail(email);
      if (sugestao && sugestao !== email) {
        await bot(`Hmm, esse e-mail parece ter um errinho de digitação. Você quis dizer <b>${esc(sugestao)}</b>?`);
        askChips(['Sim, usar o corrigido', 'Não, manter como digitei'], async (opt) => {
          user(opt);
          await confirmarEmail(opt.startsWith('Sim') ? sugestao : email);
        });
        return;
      }
      await confirmarEmail(email);
    },
  });
}
async function confirmarEmail(email) {
  state.data.email = email; state.step = 3; persist(); setProgress(3);
  salvarLead('contato');
  await etapaInstagram();
}

async function etapaInstagram(replay = false) {
  if (!replay) await bot('Agora a parte boa: qual o <b>@</b> do seu perfil no Instagram? Vou dar uma olhada nele em tempo real 👀', { delay: 800 });
  askText({
    label: 'Seu @ do Instagram', placeholder: 'seuperfil', prefix: '@',
    validate: vInsta,
    onOk: async (handle) => {
      user('@' + handle);
      state.data.instagram = handle; persist();
      await buscarPerfil(handle);
    },
  });
}

async function buscarPerfil(handle) {
  const h = esc(handle);
  const loader = showLoader(
    `🔎 Analisando o <b>@${h}</b> ao vivo`,
    ['Abrindo o perfil no Instagram', 'Lendo bio, seguidores e números', 'Carregando seus últimos reels', 'Organizando tudo pra você'],
    7000
  );
  const res = await fetchPerfil(handle);
  await loader.done();

  if (res && res.status === 'ok' && res.profile) {
    state.data.profile = res.profile;
    state.data.reels = (res.reels || []).slice(0, 6);
    state.data.nichoDetectado = res.niche || '';
    state.data.seguidores = followersToFaixa(res.profile.followersCount || 0);
    state.data.flowMode = 'apify';
    persist();
    renderProfileCard(res.profile);
    await bot('Achei! Esse é você?', { delay: 700 });
    askChips(['Sou eu ✅', 'Não é esse perfil'], async (opt) => {
      user(opt);
      if (opt.startsWith('Sou')) {
        state.step = 4; persist(); setProgress(4);
        salvarLead('parcial');
        await etapaReel();
      } else {
        state.data.profile = null; state.data.reels = null; state.data.flowMode = null; persist();
        await bot('Sem problema! Me passa o @ certinho então:');
        await etapaInstagram(true);
      }
    });
  } else {
    // Apify indisponível / perfil não encontrado → fluxo manual
    state.data.flowMode = 'manual'; state.step = 4; persist(); setProgress(4);
    salvarLead('parcial');
    if (res && res.status === 'not_found') {
      await bot(`Não consegui abrir o <b>@${h}</b> agora (pode ser privado ou novo) — sem problema, seguimos com o diagnóstico! 💪`);
    }
    await etapaSeguidoresQ();
  }
}

async function etapaReel(replay = false) {
  const reels = state.data.reels || [];
  if (!reels.length) {
    if (!replay) await bot('Não achei reels públicos recentes no perfil — sem problema, seguimos!');
    state.step = 5; persist(); setProgress(5);
    await etapaNicho();
    return;
  }
  if (!replay) await bot(`E olha o que eu separei: seus últimos reels. <b>Escolhe UM</b> pra eu analisar a fundo no seu diagnóstico 👇`);
  askReels(reels, async (reel) => {
    if (reel) {
      state.data.reel = reel;
      user(`🎬 ${reel.views != null ? fmtNum(reel.views) + ' views' : 'Reel escolhido'}${reel.caption ? ' — "' + reel.caption.slice(0, 42) + '…"' : ''}`);
    } else {
      user('Prefiro pular a análise de reel');
    }
    state.step = 5; persist(); setProgress(5);
    salvarLead('parcial');
    await etapaNicho();
  });
}

async function etapaNicho(replay = false) {
  const det = state.data.nichoDetectado;
  // nicho extraído do scraping → só pede confirmação (1 toque)
  if (det && NICHOS.includes(det)) {
    if (!replay) await bot(`Pela bio do <b>@${esc(state.data.instagram)}</b>, deu pra ver: seu nicho é <b>${esc(det)}</b>. Confere?`);
    askChips(['Confere ✅', 'É outro nicho'], async (opt) => {
      user(opt);
      if (opt.startsWith('Confere')) { await confirmarNicho(det); return; }
      await bot('Sem problema — seleciona o nicho certo aqui:');
      askSelect({
        label: 'Seu nicho', placeholder: 'Selecione seu nicho...',
        options: NICHOS.filter(n => n !== det),
        onOk: async (n) => { user(n); await confirmarNicho(n); },
      });
    });
    return;
  }
  if (!replay) await bot(`Antes de eu rodar a análise: em qual nicho o <b>@${esc(state.data.instagram)}</b> atua?`);
  askSelect({
    label: 'Seu nicho', placeholder: 'Selecione seu nicho...',
    options: NICHOS,
    onOk: async (nicho) => { user(nicho); await confirmarNicho(nicho); },
  });
}
async function confirmarNicho(nicho) {
  state.data.nicho = nicho; state.step = 6; persist(); setProgress(6);
  salvarLead('parcial');
  if (state.data.flowMode === 'apify' && state.data.profile) {
    await preDiagnostico();
  }
  await etapaDesafio();
}

/* transcreve o áudio do reel escolhido (start+poll, até ~75s); falhou → '' */
async function transcreverReel() {
  const r = state.data.reel;
  if (!r || !r.url || !/instagram\.com/i.test(r.url)) return '';
  const start = await postJSON(CONFIG.API_TRANSCRIBE, { action: 'start', reelUrl: r.url });
  if (!start || !start.ok) return '';
  const t0 = Date.now();
  while (Date.now() - t0 < 75000) {
    await sleep(3000);
    const res = await postJSON(CONFIG.API_TRANSCRIBE, { action: 'poll', runId: start.runId, datasetId: start.datasetId });
    if (!res || res.ok === false) return '';
    if (res.status === 'done') return res.transcript || '';
  }
  return '';
}

async function preDiagnostico() {
  const temReel = !!(state.data.reel && state.data.reel.url);
  const steps = temReel
    ? ['Transcrevendo o áudio do seu reel', 'Analisando o roteiro com os 7 Gatilhos', 'Medindo o Conteúdo Notável e o CTA', 'Calculando seu Score CORE']
    : ['Analisando os números do perfil', 'Aplicando os 7 Gatilhos da Atenção', 'Medindo o Conteúdo Notável e o CTA', 'Calculando seu Score CORE'];
  const loader = showLoader('🧠 Rodando o <b>Método CORE</b> no seu conteúdo', steps, temReel ? 9000 : 3400);

  if (temReel) {
    const transcript = await transcreverReel();
    if (transcript) {
      state.data.reelTranscript = transcript;
      persist();
    }
  }
  const [res] = await Promise.all([gerarPreDiagnostico(), sleep(temReel ? 1500 : 5000)]);
  await loader.done();
  await bot(blocoContextoMetodo(), { delay: 1000 });
  const htmlFinal = res.html + blocoGatilho(res.gatilho) + blocoTrancado(res.notas);
  // persiste já: se o lead der refresh com o botão na tela, o replay mostra o diagnóstico
  state.data.preDiag = true;
  state.data.preDiagHtml = htmlFinal;
  persist();
  // GATE: o lead confirma que leu os 3 pilares; só então revela o placar
  await new Promise((resolve) => {
    askChips(['Entendi, quero ver o resultado 👀'], async () => {
      await bot(htmlFinal, { delay: 1200 });
      await sleep(3000);             // diagnóstico é longo — deixa o lead ler
      resolve();
    });
  });
}

/* decide a agenda: embed da instância (vendedor sorteado no backend)
   ou, sem rota de embed, o calendário local */
async function renderAgenda() {
  const d = state.data;
  const rota = await postJSON(CONFIG.API_AGENDA, {
    action: 'route',
    renda: d.faturamento || '', nicho: d.nicho || '',
    bio: (d.profile && d.profile.biography) || '',
  }, 6000);
  // Grava a trilha assim que ela é decidida — mesmo que o lead NÃO conclua o
  // agendamento. Sem isso, o banco (e o dashboard) só conheceria a trilha de
  // quem fechou booking, sub-contando os médicos/premium que só chegaram aqui.
  if (rota && rota.track) {
    state.data.callTrack = rota.track;
    state.data.vendedor = rota.vendor || '';
    state.data.vendorEventTypeId = rota.vendorEventTypeId || null;
    persist();
    salvarLead('completo');
    dispararLeadQualificado();   // Lead aqui: lead qualificado 10k+ (closer/audience), mesmo que não agende
  }
  // Motor invisível primeiro: horários reais via API, o lead nunca vê o Cal.
  // Se a API não trouxer horários, renderAgendaInline cai no embed (se houver
  // link na trilha) e, por último, na agenda local.
  await renderAgendaInline(rota || {});
}

/* booker da instância embutido no chat — agendamento REAL sem API */
function renderAgendaEmbed(info) {
  // base derivada do próprio link do backend (evita hardcodar a instância do Cal no front)
  const base = (() => { try { return new URL(info.embedLink).origin; } catch { return ''; } })();
  const path = String(info.embedLink || '').replace(base, '').replace(/^\/+/, '');
  const row = addRow('bot', `
    <div class="ag-head">
      <span class="ag-ic">📅</span>
      <div><h4>Escolhe o melhor horário</h4><p>Sessão de diagnóstico gratuita · online</p></div>
    </div>
    <div class="cal-embed-body"><div class="cal-embed-slot"></div></div>
  `, 'agenda-card cal-embed-card');
  const slot = row.querySelector('.cal-embed-slot');

  /* snippet oficial do embed, apontando pra NOSSA instância */
  (function (C, A, L) { let p = function (a, ar) { a.q.push(ar); }; let d = C.document; C.Cal = C.Cal || function () { let cal = C.Cal; let ar = arguments; if (!cal.loaded) { cal.ns = {}; cal.q = cal.q || []; d.head.appendChild(d.createElement("script")).src = A; cal.loaded = true; } if (ar[0] === L) { const api = function () { p(api, arguments); }; const namespace = ar[1]; api.q = api.q || []; if (typeof namespace === "string") { cal.ns[namespace] = cal.ns[namespace] || api; p(cal.ns[namespace], ar); p(cal, ["initNamespace", namespace]); } else p(cal, ar); return; } p(cal, ar); }; })(window, base + "/embed/embed.js", "init");

  Cal("init", "core", { origin: base });
  Cal.ns.core("inline", {
    elementOrSelector: slot,
    calLink: path,
    config: { theme: "light", name: state.data.nome || '', email: state.data.email || '' },
  });
  Cal.ns.core("ui", { theme: "light", styles: { branding: { brandColor: "#a155f2" } }, hideEventTypeDetails: false });
  Cal.ns.core("on", { action: "bookingSuccessful", callback: (e) => onEmbedAgendado(e, row, info) });
  scrollDown();
}

async function onEmbedAgendado(e, row, info) {
  if (state.data.agendado) return;
  const det = (e && e.detail && e.detail.data) || {};
  const startISO = det.date || det.startTime || (det.booking && (det.booking.startTime || det.booking.start)) || '';
  state.data.agendado = true;
  state.data.agendamentoEm = startISO ? new Date(startISO).toISOString() : null;
  state.data.callTrack = info.track || state.data.callTrack || '';
  state.data.vendedor = info.vendor || state.data.vendedor || '';
  persist();
  salvarLead('agendado');
  dispararAgendamento();

  const pageUrl = state.data.agendamentoEm
    ? `call.html?t=${encodeURIComponent(state.data.agendamentoEm)}&n=${encodeURIComponent(state.data.nome || '')}`
    : `call.html?n=${encodeURIComponent(state.data.nome || '')}`;

  const card = row.querySelector('.bubble');
  let quandoTxt = '';
  if (state.data.agendamentoEm) {
    const q = new Date(state.data.agendamentoEm);
    quandoTxt = `${capitalizar(fmtSemana.format(q))}, ${fmtDiaLongo.format(q)} às ${String(q.getHours()).padStart(2, '0')}:${String(q.getMinutes()).padStart(2, '0')}`;
  }
  card.innerHTML = `
    <div class="ag-head">
      <span class="ag-ic">📅</span>
      <div><h4>Sessão agendada</h4><p>Te esperamos lá!</p></div>
    </div>
    <div class="ag-done">
      <div class="ag-check">✓</div>
      <h4>${quandoTxt ? esc(quandoTxt) : 'Confirmado!'}</h4>
      <p>Confirmação chega no seu WhatsApp e e-mail.</p>
      <a class="ag-link" href="${pageUrl}" target="_blank" rel="noopener">📄&nbsp; Minha página da reunião</a>
    </div>
  `;
  scrollDown();

  const s = safeData();
  await bot(`✅ <b>Agendado, ${s.primeiro}!</b> Salvei sua <a href="${pageUrl}" target="_blank" rel="noopener"><b>página da reunião</b></a> — lá tem o contador e os detalhes. Seu <b>Template dos 30 Reels Virais</b> está garantido. Até lá! 🚀`, { delay: 900 });
}

/* ================================================================
   AGENDA INLINE — calendário nativo no chat (estilo Viver de IA).
   Disponibilidade vem das regras em CONFIG.AGENDA; o horário escolhido
   vai pro Supabase (status 'agendado' + agendamento_em).
   ================================================================ */
const DIAS_SEMANA_ABREV = ['D', 'S', 'T', 'Q', 'Q', 'S', 'S'];
const fmtMes = new Intl.DateTimeFormat('pt-BR', { month: 'long', year: 'numeric' });
const fmtDiaLongo = new Intl.DateTimeFormat('pt-BR', { day: 'numeric', month: 'long' });
const fmtSemana = new Intl.DateTimeFormat('pt-BR', { weekday: 'long' });
const keyDia = (dt) => `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, '0')}-${String(dt.getDate()).padStart(2, '0')}`;
const capitalizar = (t) => t.charAt(0).toUpperCase() + t.slice(1);

function slotsDoDia(dt) {
  const A = CONFIG.AGENDA;
  const agora = new Date();
  const minTs = agora.getTime() + A.minHorasAntecedencia * 3600000;
  return A.horarios.filter((h) => {
    const [hh, mm] = h.split(':').map(Number);
    const slot = new Date(dt.getFullYear(), dt.getMonth(), dt.getDate(), hh, mm);
    return slot.getTime() >= minTs;
  });
}

function diasDisponiveis() {
  const A = CONFIG.AGENDA;
  const dias = new Map(); // key → Date
  const hoje = new Date();
  for (let i = 0; i <= A.diasAdiante; i++) {
    const dt = new Date(hoje.getFullYear(), hoje.getMonth(), hoje.getDate() + i);
    if (!A.diasSemana.includes(dt.getDay())) continue;
    if (slotsDoDia(dt).length === 0) continue;
    dias.set(keyDia(dt), dt);
  }
  return dias;
}

async function renderAgendaInline(rota = {}) {
  /* tenta o motor Cal (invisível pro lead); sem horários → embed (fallback) → regras locais */
  let modo = 'local';
  let slotsCal = null, isoCal = null;
  const dStr = (d) => `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
  {
    const hoje = new Date();
    const fimJanela = new Date(hoje.getFullYear(), hoje.getMonth(), hoje.getDate() + CONFIG.AGENDA.diasAdiante);
    const r = await postJSON(CONFIG.API_AGENDA, {
      action: 'slots', start: dStr(hoje), end: dStr(fimJanela),
      // perfil pro roteamento de trilha (premium/padrão) no backend
      renda: state.data.faturamento || '', nicho: state.data.nicho || '',
      bio: (state.data.profile && state.data.profile.biography) || '',
      // mantém o vendedor já sorteado no route (consistência slot ↔ booking)
      vendorEventTypeId: state.data.vendorEventTypeId || rota.vendorEventTypeId || null,
    }, 8000);
    if (r && r.ok && r.slots && Object.keys(r.slots).length) {
      modo = 'cal'; slotsCal = r.slots; isoCal = r.iso || {};
      state.data.callTrack = r.track || '';
      state.data.vendedor = r.vendor || '';
      state.data.vendorEventTypeId = r.vendorEventTypeId || null;
    }
  }
  state.data.agendaModo = modo; persist();

  // API não trouxe horários (sem chave, sem event type da trilha, ou erro):
  // se a trilha tem booker, usa o embed; senão segue pra agenda local.
  if (modo !== 'cal' && rota && rota.embedLink) { renderAgendaEmbed(rota); return; }

  let disponiveis;
  if (modo === 'cal') {
    disponiveis = new Map();
    Object.keys(slotsCal).sort().forEach((k) => {
      const [y, mo, d] = k.split('-').map(Number);
      disponiveis.set(k, new Date(y, mo - 1, d));
    });
  } else {
    disponiveis = diasDisponiveis();
  }
  const horariosDo = (dt) => modo === 'cal' ? (slotsCal[keyDia(dt)] || []) : slotsDoDia(dt);
  const isoDe = (dt, hora) => {
    if (modo === 'cal') return (isoCal[keyDia(dt)] || {})[hora] || '';
    const [hh, mm] = hora.split(':').map(Number);
    return new Date(dt.getFullYear(), dt.getMonth(), dt.getDate(), hh, mm).toISOString();
  };

  const agora = new Date();
  const semanaHoje = fmtSemana.format(agora);
  const horaAgora = `${String(agora.getHours()).padStart(2, '0')}:${String(agora.getMinutes()).padStart(2, '0')}`;

  const row = addRow('bot', `
    <div class="ag-head">
      <span class="ag-ic">📅</span>
      <div><h4>Agenda hoje</h4><p>Para sua reunião gratuita</p></div>
    </div>
    <div class="ag-body">
      <div class="ag-today"><span>📍 Hoje é ${esc(semanaHoje)}, ${horaAgora}</span></div>
      <div class="ag-nav">
        <button type="button" class="ag-prev" aria-label="Mês anterior">‹</button>
        <b class="ag-mes"></b>
        <button type="button" class="ag-next" aria-label="Próximo mês">›</button>
      </div>
      <div class="ag-grid">
        <div class="ag-week">${DIAS_SEMANA_ABREV.map(d => `<span>${d}</span>`).join('')}</div>
        <div class="ag-days"></div>
      </div>
      <div class="ag-slots-area"></div>
      <div class="ag-foot">Toque em um horário para agendar</div>
    </div>
  `, 'agenda-card');

  const card = row.querySelector('.agenda-card');
  const mesEl = card.querySelector('.ag-mes');
  const daysEl = card.querySelector('.ag-days');
  const slotsArea = card.querySelector('.ag-slots-area');
  const btnPrev = card.querySelector('.ag-prev');
  const btnNext = card.querySelector('.ag-next');

  const datas = [...disponiveis.values()];
  const primeiroMes = new Date(agora.getFullYear(), agora.getMonth(), 1);
  const ultimoMes = datas.length
    ? new Date(datas[datas.length - 1].getFullYear(), datas[datas.length - 1].getMonth(), 1)
    : primeiroMes;

  let mesAtual = primeiroMes;
  let diaSel = null;

  function renderMes() {
    mesEl.textContent = capitalizar(fmtMes.format(mesAtual));
    btnPrev.disabled = mesAtual <= primeiroMes;
    btnNext.disabled = mesAtual >= ultimoMes;
    daysEl.textContent = '';
    const primeiroDiaSemana = mesAtual.getDay();
    const totalDias = new Date(mesAtual.getFullYear(), mesAtual.getMonth() + 1, 0).getDate();
    for (let i = 0; i < primeiroDiaSemana; i++) {
      daysEl.appendChild(document.createElement('span'));
    }
    for (let d = 1; d <= totalDias; d++) {
      const dt = new Date(mesAtual.getFullYear(), mesAtual.getMonth(), d);
      const k = keyDia(dt);
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'ag-d';
      btn.textContent = d;
      if (disponiveis.has(k)) {
        btn.classList.add('on');
        if (diaSel && keyDia(diaSel) === k) btn.classList.add('sel');
        btn.onclick = () => { diaSel = dt; renderMes(); renderSlots(); };
      }
      daysEl.appendChild(btn);
    }
  }

  function renderSlots() {
    slotsArea.textContent = '';
    if (!diaSel) return;
    const titulo = document.createElement('div');
    titulo.className = 'ag-slots-title';
    titulo.textContent = `Horários para ${fmtDiaLongo.format(diaSel)}`;
    const grid = document.createElement('div');
    grid.className = 'ag-slots';
    horariosDo(diaSel).forEach((h) => {
      const b = document.createElement('button');
      b.type = 'button';
      b.className = 'ag-slot';
      b.textContent = h;
      b.onclick = () => confirmarAgendamento(card, diaSel, h, isoDe(diaSel, h));
      grid.appendChild(b);
    });
    slotsArea.appendChild(titulo);
    slotsArea.appendChild(grid);
    scrollDown();
  }

  // pré-seleciona o primeiro dia disponível (igual ao mockup)
  if (datas.length) { diaSel = datas[0]; mesAtual = new Date(diaSel.getFullYear(), diaSel.getMonth(), 1); }
  renderMes();
  renderSlots();
}

async function confirmarAgendamento(card, dia, hora, iso) {
  if (state.data.agendado) return;
  const d = state.data;

  // trava a UI do card enquanto confirma
  card.style.pointerEvents = 'none';
  const foot = card.querySelector('.ag-foot');
  if (foot) foot.textContent = 'Confirmando seu horário…';

  let quandoISO = iso || new Date(dia.getFullYear(), dia.getMonth(), dia.getDate(), +hora.split(':')[0], +hora.split(':')[1]).toISOString();
  let bookingUid = '', videoUrl = '';

  if (d.agendaModo === 'cal') {
    const r = await postJSON(CONFIG.API_AGENDA, {
      action: 'book', start: quandoISO,
      nome: d.nome, email: d.email, whatsapp: d.whatsapp,
      renda: d.faturamento || '', nicho: d.nicho || '',
      bio: (d.profile && d.profile.biography) || '',
      vendorEventTypeId: d.vendorEventTypeId || null,
      metadata: { instagram: '@' + (d.instagram || ''), nicho: d.nicho || '', lead_ref: state.leadRef, origem: 'diagnostico-instagram' },
    }, 14000);
    if (r && r.ok) {
      bookingUid = r.uid || '';
      videoUrl = r.videoUrl || '';
      state.data.callTrack = r.track || state.data.callTrack || '';
      state.data.vendedor = r.vendor || state.data.vendedor || '';
      if (r.start) quandoISO = r.start;
    } else if (r && r.reason === 'slot_taken') {
      card.closest('.row')?.remove();
      await bot('Eita — esse horário acabou de ser preenchido por outra pessoa 😅 Escolhe outro aqui:', { delay: 800 });
      await renderAgendaInline();
      return;
    } else {
      // qualquer outra falha do Cal (erro/timeout/sem chave): NÃO confirmar uma reunião
      // que não existe. Pede pra escolher de novo em vez de mostrar "confirmado" no escuro.
      card.closest('.row')?.remove();
      await bot('Ops, não consegui confirmar esse horário agora 😅 Pode escolher de novo aqui? Aí eu já registro certinho:', { delay: 800 });
      await renderAgendaInline();
      return;
    }
  }

  state.data.agendado = true;
  state.data.agendamentoEm = quandoISO;
  state.data.bookingUid = bookingUid;
  state.data.videoUrl = videoUrl;
  persist();
  salvarLead('agendado');
  dispararAgendamento();

  const quando = new Date(quandoISO);
  const diaTxt = `${capitalizar(fmtSemana.format(quando))}, ${fmtDiaLongo.format(quando)}`;
  const horaTxt = `${String(quando.getHours()).padStart(2, '0')}:${String(quando.getMinutes()).padStart(2, '0')}`;
  const vParam = videoUrl ? `&v=${encodeURIComponent(videoUrl)}` : '';
  const pageUrl = bookingUid
    ? `call.html?id=${encodeURIComponent(bookingUid)}${vParam}`
    : `call.html?t=${encodeURIComponent(quandoISO)}&n=${encodeURIComponent(d.nome || '')}${vParam}`;

  card.style.pointerEvents = '';
  card.innerHTML = `
    <div class="ag-head">
      <span class="ag-ic">📅</span>
      <div><h4>Sessão agendada</h4><p>Te esperamos lá!</p></div>
    </div>
    <div class="ag-done">
      <div class="ag-check">✓</div>
      <h4>${esc(diaTxt)} às ${esc(horaTxt)}</h4>
      <p>Confirmação chega no seu WhatsApp e e-mail.</p>
      <a class="ag-link" href="${pageUrl}" target="_blank" rel="noopener">📄&nbsp; Minha página da reunião</a>
    </div>
  `;
  scrollDown();

  const s = safeData();
  await bot(`✅ <b>Agendado, ${s.primeiro}!</b> ${esc(diaTxt)} às <b>${esc(horaTxt)}</b>. Salvei sua <a href="${pageUrl}" target="_blank" rel="noopener"><b>página da reunião</b></a> — lá tem o contador e o botão de entrar. Seu <b>Template dos 30 Reels Virais</b> está garantido. Até lá! 🚀`, { delay: 900 });
}

/* ================================================================
   REPLAY (refresh no meio do fluxo) + BOOT
   ================================================================ */
function replayUserLabel(st) {
  const d = state.data;
  switch (st) {
    case 0: return d.nome;
    case 1: return (d.paisDDI && d.paisDDI !== '55')
      ? '+' + d.paisDDI + ' ' + (d.whatsapp || '').slice(d.paisDDI.length)
      : maskFone((d.whatsapp || '').slice(2));
    case 2: return d.email;
    case 3: return '@' + d.instagram;
    case 4:
      if (d.flowMode !== 'apify') return d.seguidores;
      if (d.reel) return `🎬 ${d.reel.views != null ? fmtNum(d.reel.views) + ' views' : 'Reel escolhido'}`;
      return 'Prefiro pular a análise de reel';
    case 5: return d.nicho;
    case 6: return d.desafio;
    default: return '';
  }
}
function replayBotAfter(st) {
  const d = state.data;
  switch (st) {
    case 0: return [`Prazer, <b>${esc(d.nome.split(' ')[0])}</b>! 👊 Pra eu te enviar o resultado completo do diagnóstico, qual seu WhatsApp?`];
    case 1: return [MSG_UF[d.uf] || MSG_UF_FALLBACK, 'E qual seu melhor e-mail?'];
    case 2: return ['Agora a parte boa: qual o <b>@</b> do seu perfil no Instagram? Vou dar uma olhada nele em tempo real 👀'];
    case 3: {
      const msgs = [];
      if (d.flowMode === 'apify' && d.profile) msgs.push('__PCARD__', 'Achei! Esse é você?');
      return msgs;
    }
    case 4: return [`Pela bio do <b>@${esc(d.instagram)}</b>, deu pra ver: seu nicho é <b>${esc(d.nichoDetectado || '')}</b>. Confere?`];
    case 5: {
      const msgs = [];
      if (d.preDiagHtml) msgs.push(blocoContextoMetodo(), d.preDiagHtml);
      msgs.push('Me confirma uma coisa: qual é o <b>maior desafio</b> do seu perfil hoje?');
      return msgs;
    }
    case 6: return ['Última pergunta: qual a sua <b>renda mensal</b> atualmente?'];
    default: return [];
  }
}
const ETAPAS = [etapaNome, etapaWhats, etapaEmail, etapaInstagram, null, etapaNicho, etapaDesafio, etapaFaturamento];

async function boot() {
  sendBtn.onclick = () => onSubmit && onSubmit();
  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); onSubmit && onSubmit(); } });

  if (state.step > 0 && state.step < 8 && state.data.nome) {
    addRow('bot', 'Perfis que aplicam o conteúdo certo estão multiplicando o alcance em até <b>10x</b> e transformando seguidores em <b>vendas</b> — sem investir 1 real em anúncio.');
    addRow('bot', 'Bora começar: qual seu nome?');
    for (let st = 0; st < state.step; st++) {
      user(replayUserLabel(st));
      if (st === 3 && state.data.flowMode === 'apify' && state.data.profile) {
        replayBotAfter(3).forEach(m => m === '__PCARD__' ? renderProfileCard(state.data.profile) : addRow('bot', m));
        user('Sou eu ✅');
        if (state.step > 4) continue;
      } else if (st === 4 && !(state.data.nichoDetectado && NICHOS.includes(state.data.nichoDetectado))) {
        addRow('bot', `Antes de eu rodar a análise: em qual nicho o <b>@${esc(state.data.instagram)}</b> atua?`);
        continue;
      } else {
        replayBotAfter(st).forEach(m => addRow('bot', m));
        continue;
      }
      addRow('bot', 'E olha o que eu separei: seus últimos reels. <b>Escolhe UM</b> pra eu analisar a fundo no seu diagnóstico 👇');
    }
    setProgress(state.step);
    await bot('Continuando de onde você parou 😉', { delay: 600 });
    if (state.step === 4) {
      if (state.data.flowMode === 'apify') await etapaReel(true);
      else await etapaSeguidoresQ(true);
    } else {
      await ETAPAS[state.step](true);
    }
  } else {
    await sleep(500);
    await etapaNome();
  }
}
boot();
</script>
